<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Star Forge · Элитная коллекция</title>
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Unbounded:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top, #1a1a1c 0%, #000000 100%);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-muted: rgba(255, 255, 255, 0.3);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --modal-bg: rgba(20, 20, 22, 0.98);
      --modal-border: rgba(255, 255, 255, 0.1);
      --accent-gold: #FFD700;
      --accent-orange: #FFA500;
      --accent-purple: #FF64FF;
      --toast-bg: rgba(255, 255, 255, 0.05);
      --shadow-color: rgba(0, 0, 0, 0.5);
      --btn-text: #000;
      --empty-state: rgba(255, 255, 255, 0.4);
      --tab-inactive: rgba(255, 255, 255, 0.5);
      --progress-bg: rgba(255, 255, 255, 0.05);
      --resource-border: rgba(255, 255, 255, 0.05);
      --sell-btn-bg: rgba(255, 215, 0, 0.15);
      --sell-btn-border: rgba(255, 215, 0, 0.3);
      --timer-bg: rgba(255, 215, 0, 0.1);
      --timer-border: rgba(255, 215, 0, 0.15);
      --particle-color: rgba(255, 215, 0, 0.8);
      --conveyor-bg: rgba(0, 0, 0, 0.5);
      --forge-glow: rgba(255, 100, 0, 0.6);
    }

    [data-theme="light"] {
      --bg-gradient: radial-gradient(circle at top, #f5f5f7 0%, #e0e0e5 100%);
      --text-primary: #000000;
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.35);
      --card-bg: rgba(255, 255, 255, 0.6);
      --card-border: rgba(0, 0, 0, 0.12);
      --modal-bg: rgba(255, 255, 255, 0.98);
      --modal-border: rgba(0, 0, 0, 0.12);
      --accent-gold: #B8860B;
      --accent-orange: #CC7000;
      --accent-purple: #8000AA;
      --toast-bg: rgba(0, 0, 0, 0.06);
      --shadow-color: rgba(0, 0, 0, 0.15);
      --btn-text: #000000;
      --empty-state: rgba(0, 0, 0, 0.4);
      --tab-inactive: rgba(0, 0, 0, 0.5);
      --progress-bg: rgba(0, 0, 0, 0.1);
      --resource-border: rgba(0, 0, 0, 0.1);
      --sell-btn-bg: rgba(184, 134, 11, 0.12);
      --sell-btn-border: rgba(184, 134, 11, 0.3);
      --timer-bg: rgba(184, 134, 11, 0.1);
      --timer-border: rgba(184, 134, 11, 0.15);
      --particle-color: rgba(184, 134, 11, 0.8);
      --conveyor-bg: rgba(0, 0, 0, 0.3);
      --forge-glow: rgba(255, 100, 0, 0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif; -webkit-tap-highlight-color:transparent; }

    body {
      background: var(--bg-gradient);
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      overflow: hidden;
      transition: background 0.3s ease, color 0.3s ease;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #app {
      width: 100%;
      max-width: 400px;
      height: 100dvh;
      background: transparent;
      display: none;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      backdrop-filter: blur(10px);
    }

    #preloader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a0c;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }
    #preloader.hidden { opacity: 0; pointer-events: none; }
    .preloader-content { text-align: center; }
    .preloader-icon { font-size: 48px; margin-bottom: 20px; animation: float 2s infinite; }
    .preloader-progress { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .preloader-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); border-radius: 10px; transition: width 0.3s; }
    .preloader-text { margin-top: 12px; color: rgba(255,255,255,0.6); font-size: 14px; }
    .preloader-percent { margin-top: 4px; color: #FFD700; font-size: 18px; font-weight: 700; }
    @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }

    .particle { position:fixed; width:6px; height:6px; border-radius:50%; background:var(--particle-color); pointer-events:none; z-index:350; animation:particleFloat 0.8s ease-out forwards; }
    @keyframes particleFloat { 0%{opacity:1;transform:scale(1) translate(0,0);} 100%{opacity:0;transform:scale(0) translate(var(--tx),var(--ty));} }
    .elite-particle { position:fixed; width:8px; height:8px; border-radius:50%; background:radial-gradient(circle,#FFD700,#FFA500); pointer-events:none; z-index:402; box-shadow:0 0 15px #FFD700; animation:eliteParticleFloat 2.5s ease-in-out forwards; }
    @keyframes eliteParticleFloat { 0%{opacity:0;transform:translate(-50%,-50%) rotate(0deg) translateX(0);} 20%{opacity:1;} 80%{opacity:1;} 100%{opacity:0;transform:translate(-50%,-50%) rotate(360deg) translateX(80px);} }
    .screen-shake { animation: screenShake 0.12s ease-in-out; }
    @keyframes screenShake { 0%,100%{transform:translate(0,0);} 20%{transform:translate(-2px,-1px);} 40%{transform:translate(2px,1px);} 60%{transform:translate(-1px,1px);} 80%{transform:translate(1px,-1px);} }
    .collectible-flash { position:fixed; top:0;left:0;right:0;bottom:0; background:radial-gradient(circle at center,#ffffff 0%,rgba(255,255,255,0.9) 40%,transparent 100%); z-index:400; pointer-events:none; animation:collectibleFlash 1.5s ease-out forwards; }
    @keyframes collectibleFlash { 0%{opacity:0;} 15%{opacity:1;} 100%{opacity:0;} }
    .collectible-appear { position:fixed; top:50%;left:50%; transform:translate(-50%,-50%); z-index:401; text-align:center; pointer-events:none; animation:collectibleAppear 2.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
    @keyframes collectibleAppear { 0%{opacity:0;transform:translate(-50%,-30%) scale(0.3);} 25%{opacity:1;transform:translate(-50%,-50%) scale(1.3);} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.1);} 75%{opacity:1;transform:translate(-50%,-50%) scale(1.2);} 100%{opacity:0;transform:translate(-50%,-70%) scale(0.8);} }

    .toast-container { position:fixed; top:0;left:0;right:0; max-width:400px; margin:0 auto; padding:16px 12px; pointer-events:none; z-index:10000; display:flex; flex-direction:column; gap:10px; }
    .toast { background:var(--toast-bg); backdrop-filter:blur(25px); padding:16px 18px; border-radius:28px; color:var(--text-primary); font-weight:500; font-size:15px; box-shadow:0 8px 32px var(--shadow-color); border:1px solid var(--card-border); animation:slideIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275); display:flex; align-items:center; gap:10px; transition:background 0.3s ease, color 0.3s ease, border 0.3s ease; }
    .toast span { font-size:24px; }
    @keyframes slideIn { 0%{opacity:0;transform:translateY(-20px);} 100%{opacity:1;transform:translateY(0);} }

    #mainContent { flex:1; overflow-y:auto; padding:20px 16px 20px; scrollbar-width:none; -ms-overflow-style:none; }
    #mainContent::-webkit-scrollbar { display:none; }

    .tab-bar { background:rgba(0,0,0,0.2); backdrop-filter:blur(25px); border-top:1px solid var(--card-border); padding:6px 4px 10px; display:flex; justify-content:space-around; align-items:flex-end; padding-bottom:calc(6px + env(safe-area-inset-bottom,0px)); z-index:50; transition:border 0.3s ease; }
    .tab-item { display:flex; flex-direction:column; align-items:center; gap:2px; background:transparent; border:none; color:var(--tab-inactive); font-size:7px; font-weight:600; transition:all 0.2s; cursor:pointer; flex:1; padding:3px 0; border-radius:20px; }
    .tab-item:active { transform:scale(0.9); }
    .tab-item.active { color:var(--accent-gold); text-shadow:0 0 20px rgba(255,215,0,0.5); }
    .tab-icon { font-size:16px; margin-bottom:1px; }

    .theme-profile-btn { background:linear-gradient(135deg,var(--accent-gold),var(--accent-orange)); color:var(--btn-text); border:none; padding:16px; border-radius:60px; font-weight:700; font-size:16px; cursor:pointer; width:100%; margin:12px 0; box-shadow:0 4px 20px rgba(255,215,0,0.3); transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .theme-profile-btn:active { transform:scale(0.95); }
    .dev-menu-btn { background:rgba(255,100,255,0.15); border:1px solid rgba(255,100,255,0.3); color:#FF64FF; padding:8px 16px; border-radius:30px; font-weight:600; font-size:12px; cursor:pointer; transition:all 0.2s; margin-left:12px; }
    .dev-menu-btn:active { transform:scale(0.9); background:rgba(255,100,255,0.25); }

    .help-btn {
      background: rgba(255, 215, 0, 0.12);
      border: 1px solid rgba(255, 215, 0, 0.2);
      color: var(--accent-gold);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .help-btn:active { transform: scale(0.9); background: rgba(255, 215, 0, 0.25); }

    .help-btn-absolute {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(255, 215, 0, 0.12);
      border: 1px solid rgba(255, 215, 0, 0.2);
      color: var(--accent-gold);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .help-btn-absolute:active { transform: scale(0.9); background: rgba(255, 215, 0, 0.25); }

    .card { background:var(--card-bg); backdrop-filter:blur(20px); border-radius:28px; padding:20px 18px; margin-bottom:16px; border:1px solid var(--card-border); box-shadow:0 8px 32px var(--shadow-color); transition:transform 0.2s, background 0.3s ease, border 0.3s ease, box-shadow 0.3s ease; }
    .card:active { transform:scale(0.98); }
    .section-title { font-family:'Unbounded',sans-serif; font-size:20px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:10px; text-shadow:0 2px 10px var(--shadow-color); color:var(--text-primary); transition:color 0.3s ease; }
    .badge { background:rgba(255,215,0,0.15); backdrop-filter:blur(10px); padding:4px 12px; border-radius:40px; font-size:12px; font-weight:600; color:var(--accent-gold); border:1px solid rgba(255,215,0,0.2); }

    .collection-progress { margin-bottom:20px; }
    .progress-bar-container { background:var(--progress-bg); height:8px; border-radius:20px; margin:12px 0 8px; overflow:hidden; transition:background 0.3s ease; }
    .progress-bar-fill { background:linear-gradient(90deg,var(--accent-gold),var(--accent-orange),var(--accent-purple)); height:100%; border-radius:20px; width:0%; transition:width 0.5s; box-shadow:0 0 15px rgba(255,215,0,0.5); }
    .progress-text { color:var(--text-secondary); font-size:13px; font-weight:600; text-align:right; transition:color 0.3s ease; }

    .profile-header { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
    .profile-avatar { width:70px;height:70px; background:linear-gradient(135deg,var(--accent-gold),var(--accent-orange)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px; box-shadow:0 0 30px rgba(255,215,0,0.4); }
    .profile-info { flex:1; }
    .profile-name { font-family:'Unbounded',sans-serif; font-size:20px;font-weight:700; margin-bottom:4px; color:var(--text-primary); transition:color 0.3s ease; }
    .profile-status { color:var(--text-secondary); font-size:14px; margin-bottom:8px; transition:color 0.3s ease; }
    .level-badge { background:rgba(255,215,0,0.15); padding:4px 12px; border-radius:20px; font-size:14px; font-weight:700; color:var(--accent-gold); border:1px solid rgba(255,215,0,0.2); }
    .xp-bar-container { background:var(--progress-bg); height:6px; border-radius:10px; margin:16px 0 8px; overflow:hidden; transition:background 0.3s ease; }
    .xp-bar-fill { background:linear-gradient(90deg,var(--accent-gold),var(--accent-orange)); height:100%; border-radius:10px; width:0%; transition:width 0.5s; box-shadow:0 0 10px rgba(255,215,0,0.5); }
    .xp-text { color:var(--text-secondary); font-size:12px; text-align:right; transition:color 0.3s ease; }
    .vip-button { background:linear-gradient(135deg,var(--accent-gold),var(--accent-orange)); color:var(--btn-text); border:none; padding:16px; border-radius:60px; font-weight:800; font-size:16px; cursor:pointer; width:100%; margin:20px 0; box-shadow:0 4px 20px rgba(255,215,0,0.3); transition:all 0.2s; }
    .vip-button:active { transform:scale(0.95); }
    .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:16px; }
    .stat-card { background:var(--card-bg); backdrop-filter:blur(15px); border-radius:20px; padding:16px; text-align:center; border:1px solid var(--card-border); transition:background 0.3s ease, border 0.3s ease; }
    .stat-value { font-family:'Unbounded',sans-serif; font-size:28px; font-weight:800; color:var(--accent-gold); }
    .stat-label { color:var(--text-secondary); font-size:11px; margin-top:4px; transition:color 0.3s ease; }

    .sell-section { margin-top:20px; }
    .resource-item { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--resource-border); transition:border 0.3s ease; }
    .resource-info { display:flex; align-items:center; gap:12px; }
    .resource-icon { width:40px;height:40px; display:flex; align-items:center; justify-content:center; background:var(--card-bg); border-radius:14px; transition:background 0.3s ease; }
    .resource-icon img { width:70%;height:70%; object-fit:contain; }
    .resource-name { font-weight:600; color:var(--text-primary); transition:color 0.3s ease; }
    .resource-count { color:var(--text-secondary); font-size:13px; margin-top:2px; transition:color 0.3s ease; }
    .sell-btn { background:var(--sell-btn-bg); border:1px solid var(--sell-btn-border); color:var(--accent-gold); padding:8px 16px; border-radius:30px; font-weight:600; font-size:12px; cursor:pointer; transition:all 0.2s; }
    .sell-btn:active { transform:scale(0.9); background:rgba(255,215,0,0.3); }

    .expedition-item { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--resource-border); cursor:pointer; transition:border 0.3s ease; }
    .expedition-item.locked { opacity:0.5; cursor:not-allowed; }
    .expedition-info { display:flex; align-items:center; gap:16px; }
    .expedition-icon { width:56px;height:56px; display:flex; align-items:center; justify-content:center; background:var(--card-bg); border-radius:20px; border:1px solid var(--card-border); transition:background 0.3s ease, border 0.3s ease; }
    .expedition-icon img { width:80%;height:80%; object-fit:contain; filter:drop-shadow(0 4px 8px var(--shadow-color)); }
    .expedition-text h3 { font-family:'Unbounded',sans-serif; font-size:18px;font-weight:700; margin-bottom:4px; color:var(--text-primary); transition:color 0.3s ease; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .expedition-text p { font-size:14px; color:var(--text-secondary); transition:color 0.3s ease; }
    .expedition-action { min-width:100px; text-align:right; }
    .timer-badge { background:var(--timer-bg); backdrop-filter:blur(10px); padding:10px 14px; border-radius:40px; font-size:14px; font-weight:600; color:var(--accent-gold); border:1px solid var(--timer-border); transition:background 0.3s ease, border 0.3s ease; white-space:nowrap; }

    .btn { background:linear-gradient(135deg,var(--accent-gold),var(--accent-orange)); color:var(--btn-text); border:none; padding:14px 18px; border-radius:60px; font-weight:700; font-size:16px; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(255,215,0,0.3); width:100%; }
    .btn:active { transform:scale(0.92); }
    .small-btn { background:var(--card-bg); backdrop-filter:blur(10px); color:var(--accent-gold); padding:10px 16px; font-size:13px; font-weight:600; border-radius:40px; border:1px solid rgba(255,215,0,0.2); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .small-btn:active { transform:scale(0.9); }

    .inventory-subtabs { display:flex; gap:10px; margin-bottom:20px; }
    .subtab-btn { flex:1; background:var(--card-bg); backdrop-filter:blur(15px); border:1px solid var(--card-border); color:var(--text-secondary); padding:14px; border-radius:24px; font-weight:700; font-size:14px; cursor:pointer; transition:all 0.2s; }
    .subtab-btn:active { transform:scale(0.95); }
    .subtab-btn.active { background:linear-gradient(135deg,rgba(255,215,0,0.2) 0%,rgba(255,165,0,0.2) 100%); color:var(--accent-gold); border-color:rgba(255,215,0,0.3); }

    .grid-container { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .collection-card { background:var(--card-bg); backdrop-filter:blur(15px); border-radius:24px; padding:16px 8px; display:flex; flex-direction:column; align-items:center; border:1px solid var(--card-border); cursor:pointer; transition:all 0.25s; box-shadow:0 4px 20px var(--shadow-color); }
    .collection-card:active { transform:scale(0.92); border-color:rgba(255,215,0,0.4); }
    .collection-card.silhouette .card-icon img,
    .collection-card.silhouette .card-icon .fallback-icon { filter:brightness(0) !important; opacity:0.6; }
    .collection-card.silhouette { opacity:0.5; border-color:var(--card-border); box-shadow:none; }
    .card-icon { width:70px;height:70px; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
    .card-icon img { width:100%;height:100%; object-fit:contain; filter:drop-shadow(0 8px 16px var(--shadow-color)); }
    .card-name { font-family:'Unbounded',sans-serif; font-size:13px; font-weight:600; color:var(--text-primary); text-align:center; transition:color 0.3s ease; }
    .collection-card.silhouette .card-name { color:var(--text-muted); }
    .card-count-badge { background:rgba(255,215,0,0.15); backdrop-filter:blur(10px); color:var(--accent-gold); padding:2px 10px; border-radius:30px; font-size:11px; font-weight:700; margin-top:6px; border:1px solid rgba(255,215,0,0.2); }
    .empty-state { color:var(--empty-state); text-align:center; padding:48px 0; font-size:16px; transition:color 0.3s ease; }

    .event-placeholder { background:var(--card-bg); backdrop-filter:blur(20px); border-radius:28px; padding:40px 24px; margin-bottom:16px; border:1px solid var(--card-border); box-shadow:0 8px 32px var(--shadow-color); text-align:center; }
    .event-icon { font-size:64px; margin-bottom:20px; opacity:0.6; }
    .event-title { font-family:'Unbounded',sans-serif; font-size:18px;font-weight:700; margin-bottom:12px; color:var(--text-secondary); }
    .event-desc { color:var(--text-muted); font-size:14px; line-height:1.5; }

    .modal-overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(15px); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:opacity 0.3s; }
    .modal-overlay.active { opacity:1; visibility:visible; }
    .modal-sheet { background:var(--modal-bg); backdrop-filter:blur(30px); width:90%; max-width:360px; max-height:80vh; border-radius:40px; padding:24px 20px 32px; transform:scale(0.9); transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275), background 0.3s ease; overflow-y:auto; border:1px solid var(--modal-border); box-shadow:0 20px 60px var(--shadow-color); position:relative; margin:0 auto; }
    .modal-overlay.active .modal-sheet { transform:scale(1); }
    .modal-handle { width:50px;height:5px; background:rgba(255,255,255,0.2); border-radius:100px; margin:0 auto 20px; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .modal-title { font-family:'Unbounded',sans-serif; font-size:20px;font-weight:700; text-align:center; flex:1; color:var(--text-primary); transition:color 0.3s ease; }
    .modal-close { background:var(--card-bg); border:1px solid var(--card-border); color:var(--text-primary); width:40px;height:40px; border-radius:100px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .modal-close:active { transform:scale(0.9); background:rgba(255,255,255,0.1); }
    .modal-content { color:var(--text-primary); text-align:center; transition:color 0.3s ease; }
    .modal-icon-large { width:140px;height:140px; margin:16px auto; display:flex; align-items:center; justify-content:center; }
    .modal-icon-large img { width:100%;height:100%; object-fit:contain; filter:drop-shadow(0 10px 30px var(--shadow-color)); }
    .modal-description { color:var(--text-secondary); font-size:14px; line-height:1.5; margin-bottom:20px; text-align:center; transition:color 0.3s ease; }

    <div class="showcase-overlay" id="showcaseOverlay">
      <div class="showcase-header"><button class="showcase-close" id="showcaseClose">✕</button></div>
      <div class="showcase-content" id="showcaseContent"></div>
    </div>

    <div class="brawl-overlay" id="brawlOverlay">
      <div class="brawl-content" id="brawlContent">
        <div class="brawl-geode" id="brawlGeode"></div>
        <div class="brawl-counter" id="brawlCounter">10</div>
        <div class="brawl-hint">Тапай, чтобы разбить</div>
        <div class="brawl-result" id="brawlResult">
          <div class="brawl-result-icon" id="brawlResultIcon"></div>
          <div class="brawl-result-name" id="brawlResultName"></div>
          <div class="brawl-result-rarity" id="brawlResultRarity"></div>
        </div>
        <button class="brawl-close-btn" id="brawlCloseBtn" style="display:none;">Продолжить</button>
      </div>
    </div>

    <div class="conveyor-overlay" id="conveyorOverlay">
      <div class="conveyor-container">
        <div class="conveyor-title" id="conveyorTitle">Анализ жеоды...</div>
        <div class="conveyor-window">
          <div class="conveyor-track" id="conveyorTrack"></div>
          <div class="conveyor-pointer"></div>
        </div>
      </div>
    </div>

    <div class="forge-overlay" id="forgeOverlay">
      <div class="forge-content" id="forgeContent"></div>
    </div>

    <div class="forge-progress-overlay" id="forgeProgressOverlay">
      <div class="forge-progress-content">
        <div class="forge-progress-label" id="forgeProgressLabel">Идёт переплавка...</div>
        <div class="forge-crucible">
          <div class="forge-crucible-emoji">🪣</div>
          <div class="forge-molten" id="forgeMolten"></div>
        </div>
        <div class="forge-progress-bar">
          <div class="forge-progress-fill" id="forgeProgressFill"></div>
        </div>
        <div class="forge-progress-time" id="forgeProgressTime">15с</div>
      </div>
    </div>

    <div class="reward-popup-overlay" id="rewardPopupOverlay">
      <div class="reward-popup">
        <div class="reward-popup-icon" id="rewardPopupIcon"></div>
        <div class="reward-popup-name" id="rewardPopupName"></div>
        <button class="reward-popup-btn" id="rewardPopupClose">Продолжить</button>
      </div>
    </div>

    <div class="signal-game-overlay" id="signalGameOverlay">
      <div class="signal-game-timer" id="signalTimer">10</div>
      <div class="signal-game-counter" id="signalCounter">Сигналов: 0 / 8</div>
      <div id="signalGameArea" style="position: relative; width: 100%; height: 60vh;"></div>
    </div>

    <!-- ☄️ МЕТЕОРИТНЫЙ ШТОРМ -->
    <div class="meteor-storm-overlay" id="meteorStormOverlay">
      <div class="storm-timer" id="stormTimerDisplay">20</div>
      <div class="storm-shards" id="stormShardsDisplay">Осколков: 0</div>
      <div class="storm-area" id="meteorStormArea"></div>
    </div>

    <!-- МИНИ-ИГРЫ: ОВЕРЛЕИ -->
    <div class="minigame-overlay" id="minigameOverlay" style="background:radial-gradient(circle at center, #1a1a1c 0%, #0a0a0c 100%);">
      <button class="minigame-close-btn" id="minigameCloseBtn">✕</button>
      <canvas id="minigameCanvas" class="minigame-canvas"></canvas>
      <div class="minigame-result" id="minigameResult">
        <div class="minigame-result-title" id="minigameResultTitle"></div>
        <div class="minigame-result-score" id="minigameResultScore"></div>
        <div class="minigame-result-reward" id="minigameResultReward"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js?v=20260130"></script>
</body>
</html>
